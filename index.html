<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mini Calculator</title>
<style>
body{font-family:system-ui;margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f5f0}
.c{width:min(420px,92vw);background:#fff;padding:16px;border:1px solid #ddd;border-radius:12px}
input,button{font:inherit;padding:10px;border-radius:8px;border:1px solid #ccc}
input{width:100%;margin:8px 0} .r{display:flex;gap:8px} .r button{flex:1}
#o{margin-top:10px;min-height:24px;font-weight:700;word-break:break-word} .e{color:#b42318}
</style></head><body>
<div class="c"><h3 style="margin:0">Calculator</h3>
<div style="font-size:12px;color:#666">Supports + - * / % ^, (), recip(), reciprocal(), implicit multiplication, no spaces.</div>
<input id="x" placeholder="Example: 4(15+2)^5/6%recip(2)">
<div class="r"><button id="go">Calculate</button><button id="clr">Clear</button></div>
<div id="o">-</div></div>
<script>
const x=document.getElementById('x'),o=document.getElementById('o');
const ok=/^[0-9()+\-*/%^.a-zA-Z]+$/;
function run(){
  try{
    const s=x.value;
    if(!s) throw Error('Empty expression');
    if(/\s/.test(s)) throw Error('Invalid expression');
    if(!ok.test(s)) throw Error('Invalid character');
    let e=s.replace(/reciprocal\(/g,'1/(').replace(/recip\(/g,'1/(');
    e=e.replace(/(\d|\))(\()/g,'$1*$2').replace(/(\))(\d)/g,'$1*$2');
    e=e.replace(/\^/g,'**');
    const v=Function('"use strict";return ('+e+')')();
    if(!Number.isFinite(v)) throw Error('Math error');
    o.className=''; o.textContent=String(v);
  }catch(err){ o.className='e'; o.textContent=err.message||'Invalid expression'; }
}
document.getElementById('go').onclick=run;
document.getElementById('clr').onclick=()=>{x.value='';o.className='';o.textContent='-';x.focus();};
x.addEventListener('keydown',e=>{if(e.key==='Enter') run();});
x.value='2+3*4'; run();
</script></body></html>
